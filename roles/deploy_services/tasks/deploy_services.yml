---
# ---------------------------------------------------------
# 1. 안전장치: NFS 위에 해당 서비스 폴더가 진짜 있는지 검증
# ---------------------------------------------------------
- name: "[Safety Check] Verify service directories exist on NFS"
  stat:
    path: "{{ local_service_path }}/{{ item }}"
  register: dir_check
  loop: "{{ target_services | default([]) }}"
  when: target_services is defined

- name: "[Safety Check] Fail if directory is missing"
  fail:
    msg: "🚨 폴더가 없습니다: {{ local_service_path }}/{{ item.item }}. n4000 외장하드에 해당 폴더와 compose 파일이 있는지 확인하세요!"
  loop: "{{ dir_check.results }}"
  when: 
    - target_services is defined
    - not item.stat.exists or not item.stat.isdir

# ---------------------------------------------------------
# 2. 메인 배포: Docker Compose V2 실행
# ---------------------------------------------------------
# roles/deploy_services/tasks/deploy_services.yml

- name: "[Prepare] Ensure NFS directory ownership for container root"
  become: yes
  file:
    path: "{{ local_service_path }}/{{ item }}"
    state: directory
    # 클라이언트의 root가 서버의 root와 동기화되도록 강제
    owner: "{{ ansible_user }}" 
    group: "{{ ansible_user }}"
    mode: '0775'
  loop: "{{ target_services | default([]) }}"

- name: "[Deploy] Start Docker Compose services"
  community.docker.docker_compose_v2:
    project_src: "{{ local_service_path }}/{{ item }}"
    pull: missing 
    remove_orphans: yes
    state: present
    # 중요: NFS 지연을 고려해 컨테이너가 안정화될 때까지 기다림
    wait: yes
    wait_timeout: 60
  loop: "{{ target_services | default([]) }}"
  when: target_services is defined
  register: compose_output

# ---------------------------------------------------------
# 3. 결과 출력: 어떤 노드에 뭐가 배포되었는지 요약
# ---------------------------------------------------------
- name: "[Report] Deployment Summary"
  debug:
    msg: "✅ [{{ inventory_hostname }}] 노드에 '{{ item.item }}' 서비스가 성공적으로 배포/업데이트 되었습니다."
  loop: "{{ compose_output.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: 
    - target_services is defined
    - item.changed or not item.failed
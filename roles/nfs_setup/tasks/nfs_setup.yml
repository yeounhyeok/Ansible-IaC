---
# ---------------------------------------------------------
# [COMMON] 패키지 관리
# ---------------------------------------------------------
- name: "[Common] Update apt cache"
  apt:
    update_cache: yes
    cache_valid_time: 3600
- name: "[Server] Install NFS Server package on n4000"
  apt:
    name: nfs-kernel-server
    state: present
  when: inventory_hostname == 'n4000'
- name: "[Client] Install NFS Common package on Worker Nodes"
  apt:
    name: nfs-common
    state: present
  when: inventory_hostname != 'n4000'

# ---------------------------------------------------------
# [PRE-CHECK & CLEANUP] 구시대의 유물 정리 (중요)
# ---------------------------------------------------------
- name: "[Client] Unmount OLD problematic NFS paths"
  mount:
    path: "/home/yeoun/docker_volumes"  # 과거에 쓰던 꼬인 경로
    state: absent                       # fstab에서도 지우고 마운트도 해제
  when: inventory_hostname != 'n4000'

- name: "[Server] Remove OLD symbolic link on n4000"
  file:
    path: "/home/yeoun/docker_volumes"
    state: absent
  when: inventory_hostname == 'n4000'

# ---------------------------------------------------------
# [SERVER] NFS 서버 설정 (n4000)
# ---------------------------------------------------------
- name: "[Server] Ensure NFS server is started"
  service:
    name: nfs-kernel-server
    state: started
    enabled: yes
  when: inventory_hostname == 'n4000'

- name: "[n4000] Configure NFS exports"
  template:
    src: ../templates/exports.j2
    dest: /etc/exports
  register: nfs_exports_updated
  when: inventory_hostname == 'n4000'

- name: "[n4000] Apply NFS exports"
  command: exportfs -ra
  when: nfs_exports_updated.changed and inventory_hostname == 'n4000'

# ---------------------------------------------------------
# [CLIENT] 새로운 표준 경로로 마운트 (Worker Nodes)
# ---------------------------------------------------------
- name: "[Client] Ensure NEW mount point directory exists"
  file:
    path: "{{ client_mount_path }}"  # 표준 경로로 통일
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0775'
  when: inventory_hostname != 'n4000'

- name: "[Client] Mount NFS to NEW reliable path"
  mount:
    path: "{{ client_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ real_data_path }}"
    fstype: nfs
    opts: "defaults,_netdev,nofail,soft,timeo=14,retrans=2"
    state: mounted
  when: inventory_hostname != 'n4000'


